<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CLCD Static CI/CD v2</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="hero" aria-labelledby="page-title">
        <p class="eyebrow">ShotOps CI/CD verification</p>
        <h1 id="page-title">CLCD static landing page v2</h1>
        <p class="lede">
          Version 2 was pushed from GitHub to verify ShotOps automatic Safe Deploy,
          health checks, live progress, routing, and history updates end to end.
        </p>
        <div class="status-grid" aria-label="Deployment test details">
          <article>
            <span>Version</span>
            <strong id="version">v2</strong>
          </article>
          <article>
            <span>Runtime</span>
            <strong>Static</strong>
          </article>
          <article>
            <span>Trigger</span>
            <strong>GitHub push</strong>
          </article>
        </div>
      </section>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
